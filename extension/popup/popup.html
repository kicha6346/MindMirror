<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindMirror</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../icons/icon48.png" alt="MindMirror Logo" class="logo" onerror="this.style.display='none'">
      <h1>MindMirror</h1>
    </div>
    
    <div id="unauth-view" style="display: none; text-align: center; padding: 10px 0;">
      <p style="margin-bottom: 12px; font-weight: 500;">Please log in to track your stats.</p>
      <button id="login-btn" style="width: 100%; padding: 10px; background: #818cf8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Login / Register</button>
    </div>

    <div id="auth-view" style="display: none;">
      <div class="status-card">
        <p>Tracking Status: <span id="status-text" class="active">Active</span></p>
      
      <label class="switch">
        <input type="checkbox" id="pause-toggle">
        <span class="slider round"></span>
      </label>
      <span class="toggle-label">Pause Tracking</span>
      </div>
      <button id="dashboard-btn" style="margin-top: 16px; width: 100%; padding: 10px; background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; font-weight: 600;">View Dashboard</button>
    </div>

    <div class="disclaimer">
      <p>Not medical advice. MindMirror tracks behavior locally to help detect burnout risk.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
